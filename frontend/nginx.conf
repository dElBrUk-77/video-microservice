server {
    listen 80;
    server_name localhost;
    client_max_body_size 500M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # SERVIR VIDEO DIRECTO (ALTO RENDIMIENTO)
    # Solo accesible si Nginx pudiera validar JWT (o dejamos que el backend lo gestione por ahora)
    location /protected_videos/ {
        alias /usr/share/nginx/html/protected_videos/;
        add_header Access-Control-Allow-Origin *;
        # En una v4 real, usaríamos auth_request para validar JWT aquí.
    }

    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /auth/ {
        proxy_pass http://backend:4000/auth/;
        proxy_set_header Host $host;
    }
    
    location /social/ {
        proxy_pass http://backend:4000/social/;
        proxy_set_header Host $host;
    }

    location /super/ {
        proxy_pass http://backend:4000/super/;
        proxy_set_header Host $host;
    }
}
